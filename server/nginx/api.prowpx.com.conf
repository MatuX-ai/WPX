# =============================================================================
# WPX API 反向代理配置（Nginx）
# 站点域名：api.prowpx.com
# 后端进程：127.0.0.1:3000（由 PM2 / systemd 监听）
# 部署方式：cp nginx/api.prowpx.com.conf /etc/nginx/conf.d/api.prowpx.com.conf
#           nginx -t && nginx -s reload
# =============================================================================

# HTTP 入口：强制跳转 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.prowpx.com;

    # Let's Encrypt 校验需要保留 /.well-known/acme-challenge/
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.prowpx.com;

    # ---- TLS 证书（Let's Encrypt） ----
    ssl_certificate     /etc/letsencrypt/live/api.prowpx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prowpx.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # ---- 安全响应头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ---- 客户端最大上传 ----
    client_max_body_size 5m;

    # ---- 访问/错误日志 ----
    access_log /var/log/nginx/api.prowpx.com.access.log;
    error_log  /var/log/nginx/api.prowpx.com.error.log warn;

    # ---- 透传真实客户端信息（app.js 已信任 1 层代理） ----
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;  # 上游是 SLB 时收紧为 SLB 内网段

    # ---- 通用反代 ----
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # 透传关键请求头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket / 长连接（如果以后接入实时通道）
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # 超时
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 缓冲：流式响应（如 CSV 导出）禁用缓冲
        proxy_buffering off;
        proxy_request_buffering off;

        # 重定向错误
        proxy_intercept_errors off;
    }

    # ---- 健康检查端点：直返，不打日志 ----
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:3000/healthz;
    }
    location = /readyz {
        access_log off;
        proxy_pass http://127.0.0.1:3000/readyz;
    }

    # ---- 隐藏敏感路径（按需） ----
    # location ~ /\.(env|git|svn) { deny all; return 404; }
}