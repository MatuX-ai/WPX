<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="WPX · AI 智能文档编辑器">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="gtext" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo 圆角方块（左上） -->
  <g transform="translate(96, 96)">
    <rect width="96" height="96" rx="24" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <path d="M22 28 L36 70 L46 46 L54 70 L68 28 M72 28 L82 28 M72 46 L82 46 M72 64 L82 64" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="78" cy="20" r="5" fill="#FBBF24"/>
  </g>
  <text x="220" y="160" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="white">WPX</text>

  <!-- 主标题 -->
  <text x="96" y="380" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="800" fill="url(#gtext)">让写作更自由的</text>
  <text x="96" y="470" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="800" fill="#FFFFFF">AI 文档编辑器</text>

  <!-- 副标题 -->
  <text x="96" y="520" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.85)">多窗口编辑 · AI 改写 · 虚拟纸张 · 完全本地化</text>

  <!-- 网址 -->
  <text x="96" y="568" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.7)">wpx.app</text>

  <!-- 装饰：右下角 -->
  <g transform="translate(900, 480)" opacity="0.9">
    <rect width="200" height="80" rx="16" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <rect x="14" y="14" width="20" height="20" rx="4" fill="#FBBF24" opacity="0.8"/>
    <text x="44" y="34" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="white">图片去背景</text>
    <text x="44" y="58" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)">本地推理 · 隐私无忧</text>
  </g>
  <g transform="translate(900, 380)" opacity="0.9">
    <rect width="200" height="80" rx="16" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <rect x="14" y="14" width="20" height="20" rx="4" fill="#34D399" opacity="0.8"/>
    <text x="44" y="34" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="white">7z 压缩</text>
    <text x="44" y="58" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.7)">一键打包研究资料</text>
