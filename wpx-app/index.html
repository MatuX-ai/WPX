<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WPX · AI 智能文档编辑器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!--
      Electron 桌面端：window.electronAPI 由 electron/preload.js 经 contextBridge 注入。
      渲染进程请通过 electronAPI 与主进程通信，不要直接使用 ipcRenderer。
    -->
    <script>
      ;(function () {
        if (typeof window !== 'undefined' && window.electronAPI) {
          window.__WPX_ELECTRON__ = true
        }
      })()
    </script>
    <script>
      ;(function () {
        var theme = 'light'
        try {
          var raw = localStorage.getItem('wpx-theme')
          if (raw) {
            var mode = JSON.parse(raw).mode
            if (mode === 'dark') theme = 'dark'
            else if (mode === 'system') {
              theme = window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
            }
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            theme = 'dark'
          }
        } catch (e) {}
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
